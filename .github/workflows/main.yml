name: Manual SSH Debugging

# This is the "trigger" you were missing
on: 
  workflow_dispatch:

jobs:
  ssh-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          # This ensures the session stays open even if a step fails
          limit-access-to-registered-users: false
