name: Manual SSH Debugging
on: 
  workflow_dispatch:

jobs:
  ssh-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          # This limits access to ONLY you (the person who clicked 'Run')
          # It requires you to have your SSH public key uploaded to your GitHub profile
          limit-access-to-actor: true
